<!DOCTYPE html>
<html>

<head>

<title>Attendance CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="attendance-crm/manifest.json">
<style>

/* ==============================

   GOOGLE FONT

================================*/

@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");



/* ==============================

   VARIABLES

================================*/

:root {

  --primary: #2563eb;

  --success: #16a34a;

  --danger: #dc2626;

  --dark: #374151;



  --border: #e5e7eb;

  --text: #374151;

  --muted: #6b7280;



  --bg: #f3f4f6;

  --white: #ffffff;



  --radius: 8px;



  --space-sm: 8px;

  --space-md: 16px;

  --space-lg: 24px;

}



/* ==============================

   RESET

================================*/

*,

*::before,

*::after {

  margin: 0;

  padding: 0;

  box-sizing: border-box;

}



/* ==============================

   BODY

================================*/

body {

  font-family: "Poppins", sans-serif;

  background: var(--bg);

  min-height: 100vh;

  display: flex;

  align-items: center;

  justify-content: center;

  padding: 30px;

  color: var(--text);

  line-height: 1.5;

}



/* ==============================

   CONTAINER

================================*/

.container {

  width: 100%;

  max-width: 650px;

  background: var(--white);

  padding: 32px;

  border-radius: var(--radius);

  border: 1px solid var(--border);

}



.container h2 {

  font-size: 20px;

  margin-bottom: var(--space-md);

}



/* ==============================

   BUTTONS

================================*/

button {

  padding: 10px 18px;

  border-radius: var(--radius);

  border: 1px solid transparent;

  font-size: 14px;

  font-weight: 500;

  cursor: pointer;

  margin: 4px;

}



button:focus {

  outline: 2px solid var(--primary);

  outline-offset: 2px;

}



/* Login button */

.login {

  background: var(--success);

  color: white;

}



.login:hover {

  background: #15803d;

}



/* Logout button */

.logout {

  background: var(--danger);

  color: white;

}



.logout:hover {

  background: #b91c1c;

}



/* Logout user */

.logoutUser {

  background: var(--dark);

  color: white;

  float: right;

}



.logoutUser:hover {

  background: #1f2937;

}



/* ==============================

   TABLE

================================*/

table {

  width: 100%;

  margin-top: var(--space-lg);

  border-collapse: collapse;

  font-size: 14px;

}



thead th {

  text-align: left;

  padding: 12px;

  font-weight: 600;

  border-bottom: 2px solid var(--border);

  color: var(--muted);

}



tbody td {

  padding: 12px;

  border-bottom: 1px solid var(--border);

}



tbody tr:hover {

  background: #f9fafb;

}



/* ==============================

   RESPONSIVE

================================*/

@media (max-width: 600px) {



  body {

    padding: 20px;

  }



  .container {

    padding: 24px;

  }



  button {

    width: 100%;

    margin-top: 8px;

  }



  .logoutUser {

    float: none;

  }



  table {

    font-size: 13px;

  }



  thead {

    display: none;

  }



  table,

  tbody,

  tr,

  td {

    display: block;

    width: 100%;

  }



  tr {

    margin-bottom: 14px;

    border: 1px solid var(--border);

    border-radius: var(--radius);

    padding: 10px;

  }



  td {

    border: none;

    padding: 6px 0;

    display: flex;

    justify-content: space-between;

  }

}

</style>

</head>

<body>

<div class="container">

<button class="logoutUser" onclick="logoutUser()">Logout</button>

<h2 id="welcome"></h2>

<h3>Monthly Summary</h3>

<div id="summary">

<p><b>Days Worked:</b> <span id="daysWorked">0</span></p>

<p><b>Total Hours:</b> <span id="totalHours">0</span></p>

</div>

<div style="margin-top:10px">

<button class="login" onclick="checkIn()">Check In</button>
<button class="logout" onclick="checkOut()">Check Out</button>

</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Login</th>
<th>Logout</th>
<th>Hours</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>

<script>

/* =========================
   OFFICE LOCATION
========================= */

const officeLat = 28.53229417891668
const officeLng = 77.39766413771919
const allowedRadius = 100

/* =========================
   USER CHECK
========================= */

const employee = localStorage.getItem("employee")

if(!employee){
window.location="login.html"
}

document.getElementById("welcome").innerText = "Welcome " + employee

/* =========================
   CHECK IN
========================= */

async function checkIn(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(async function(pos){

let lat = pos.coords.latitude
let lng = pos.coords.longitude

let res = await fetch("/checkin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
employee,
lat,
lng
})
})

let data = await res.json()

alert(data.message)

loadAttendance()

},
function(){
alert("Location permission required to check in")
})

}

/* =========================
   CHECK OUT
========================= */

async function checkOut(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(async function(pos){

let lat = pos.coords.latitude
let lng = pos.coords.longitude

let res = await fetch("/checkout",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
employee,
lat,
lng
})
})

let data = await res.json()

alert(data.message)

loadAttendance()

},
function(){
alert("Location permission required to check out")
})

}

/* =========================
   LOGOUT
========================= */

function logoutUser(){

localStorage.removeItem("employee")

window.location="login.html"

}

/* =========================
   LOAD ATTENDANCE
========================= */

async function loadAttendance(){

try{

let res = await fetch("/attendance")

let data = await res.json()

let table = document.getElementById("attendanceTable")

table.innerHTML=""

let employeeData = data.filter(a => a.employee === employee)

employeeData.forEach(a => {

let row = `
<tr>
<td>${a.date || "-"}</td>
<td>${a.login || "-"}</td>
<td>${a.logout || "-"}</td>
<td>${a.hours || "0"}</td>
</tr>
`

table.innerHTML += row

})

calculateMonthly(employeeData)

}catch(err){

console.log("Load error",err)

}

}

/* =========================
   MONTHLY SUMMARY
========================= */

function calculateMonthly(records){

let daysWorked = records.length
let totalHours = 0

records.forEach(r=>{
totalHours += Number(r.hours) || 0
})

document.getElementById("daysWorked").innerText = daysWorked
document.getElementById("totalHours").innerText = totalHours.toFixed(2)

}

/* =========================
   INIT
========================= */

loadAttendance()

</script>

</body>
</html>
